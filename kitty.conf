font_family JetBrainsMono Nerd Font Mono
font_size 11.5

confirm_os_window_close 0
enable_audio_bell no
background_opacity 0.95
cursor_shape beam

window_border_width 0
draw_minimal_borders yes
window_margin_width 0
window_padding_width 0
# active_border_color #ff00ff
# inactive_border_color #333333


# BEGIN_KITTY_THEME
# Neowave
include current-theme.conf
# END_KITTY_THEME

background_image /home/useroot/Descargas/fondo1.jpg
background_tint 0.85
allow_remote_control yes
background_image_layout scaled

#qtile/config1.py
# Evitar que Kitty capture los atajos de mover ventanas de Qtile
map ctrl+shift+alt+left no_op
map ctrl+shift+alt+right no_op
map ctrl+shift+alt+up no_op
map ctrl+shift+alt+down no_op

# Por si las dudas, también para la tecla Super (Mod) si Kitty la detecta como super
map super+shift+ctrl+left no_op
map super+shift+ctrl+right no_op
map super+shift+ctrl+up no_op
map super+shift+ctrl+down no_op
